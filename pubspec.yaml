name: framecut
description: FrameCut — Professional Native Android Video Editor with 60+ features
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video editing core
  pro_video_editor: ^2.5.1
  ffmpeg_kit_flutter_new: ^4.3.2
  video_player: ^2.9.1

  # Media & files
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Audio
  just_audio: ^0.9.43

  # UI & Navigation
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  haptic_feedback: ^0.3.0
  cached_network_image: ^3.4.1

  # Export & Share
  share_plus: ^10.1.2
  flutter_local_notifications: ^18.0.1
  image: ^4.2.0

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  collection: ^1.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/luts/
    - assets/sfx/
    - assets/templates/
    - assets/icons/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
